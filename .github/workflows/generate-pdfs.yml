name: Generate media kit PDFs
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-generate-pdfs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install apt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2 libpango-1.0-0 libpangocairo-1.0-0 libpangoft2-1.0-0 libgdk-pixbuf2.0-0 libffi-dev shared-mime-info pkg-config fonts-dejavu

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Create venv and install WeasyPrint
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip setuptools wheel
          pip install weasyprint

      - name: Generate PDFs
        run: |
          source venv/bin/activate
          python -m weasyprint media_kit_small.html media_kit_small.pdf
          python -m weasyprint media_kit_mid.html media_kit_mid.pdf
          python -m weasyprint media_kit_large.html media_kit_large.pdf

      - name: Commit PDFs
        env:
          REPO_PUSH_TOKEN: ${{ secrets.REPO_PUSH_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add media_kit_*.pdf || true
          git commit -m "Auto-generate media kit PDFs" || echo "No changes to commit"
          git remote set-url origin https://x-access-token:${REPO_PUSH_TOKEN}@github.com/${{ github.repository }}
          git push origin HEAD:main

      - name: Post Setup Python
        if: always()
        run: echo "done"
